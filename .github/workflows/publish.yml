name: Publish to Qiita

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/publish.yml'
      - 'source/articles/**/*.md'
      - 'source/images/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish_qiita:
    runs-on: ubuntu-latest
    env:
      QIITA_IMAGE_BASE_URL: https://cdn.jsdelivr.net/gh/profe168/tech-blog@master/source
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm test

      - name: Convert and Sync Platforms
        run: pnpm run publish

      - name: Commit sync results
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add platforms/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-convert source to platforms" && git push)

      - name: Publish Qiita articles
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: pnpm exec qiita publish --all --root ./platforms/qiita

      - name: Commit Qiita article IDs
        run: |
          git add platforms/qiita/articles
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Qiita Article ID [skip ci]" && git push)
